<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Log In | Reputation Spark</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
   <style>
       body {
           font-family: 'Inter', sans-serif;
       }
       h1, h2, h3 {
           font-family: 'Poppins', sans-serif;
       }
       .brand-gradient-bg {
           background-image: linear-gradient(to right, #2B6CB0, #38B2AC);
       }
   </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">


   <div class="w-full max-w-md mx-auto p-4">
       <div class="bg-white rounded-2xl shadow-lg p-8 sm:p-10">
           <div class="text-center mb-8">
               <a href="reputation_spark_design.html" class="flex-shrink-0 flex items-center justify-center space-x-2">
                   <!-- Logo Icon -->
                   <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10l.75 1.5L14.25 12l-1.5.75L12 14.25l-.75-1.5L9.75 12l1.5-.75L12 10z"></path></svg>
                   <span class="text-2xl font-bold text-gray-800">Reputation<span class="font-light text-teal-600">Spark</span></span>
               </a>
               <h1 class="text-2xl font-bold text-gray-800 mt-4">Welcome back!</h1>
               <p class="text-gray-500 mt-2">Log in to manage your reviews.</p>
           </div>
          
           <form action="#" method="POST">
               <div class="space-y-6">
                   <div>
                       <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                       <div class="mt-1">
                           <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                       </div>
                   </div>


                   <div>
                       <div class="flex items-center justify-between">
                           <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                           <div class="text-sm">
                               <a href="reputation_spark_forgot_password.html" class="font-medium text-blue-600 hover:text-blue-500">
                                   Forgot your password?
                               </a>
                           </div>
                       </div>
                       <div class="mt-1">
                           <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                       </div>
                   </div>


                   <div>
                       <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white brand-gradient-bg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                           Log In
                       </button>
                   </div>
               </div>


               <div class="mt-6">
                   <div class="relative">
                       <div class="absolute inset-0 flex items-center">
                           <div class="w-full border-t border-gray-300"></div>
                       </div>
                       <div class="relative flex justify-center text-sm">
                           <span class="px-2 bg-white text-gray-500">Or continue with</span>
                       </div>
                   </div>


                   <div class="mt-6">
                       <a href="#" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                           <span class="sr-only">Sign in with Google</span>
                           <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                               <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.574l6.19,5.238C42.021,35.596,44,30.138,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
                           </svg>
                       </a>
                   </div>
               </div>
           </form>


           <p class="mt-8 text-center text-sm text-gray-600">
               Don't have an account yet?
               <a href="reputation_spark_signup.html" class="font-medium text-blue-600 hover:text-blue-500">
                   Sign up
               </a>
           </p>
       </div>
   </div>


</body>
</html>
